<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>减肥追踪 · 体重</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<header>
  <a class="logo" href="dashboard.html">
    <span class="logo-icon">🔥</span>
    <span>减肥追踪</span>
  </a>
  <div class="header-right">
    <span class="header-user" id="userEmail"></span>
    <button class="btn btn-secondary btn-sm" onclick="logout()">退出</button>
  </div>
</header>

<nav>
  <a href="dashboard.html">📊 概览</a>
  <a href="weight.html" class="active">⚖️ 体重</a>
  <a href="diet.html">🥗 饮食</a>
  <a href="training.html">💪 训练</a>
  <a href="mealplan.html">📋 饮食计划</a>
</nav>

<main>

  <!-- 记录体重 -->
  <div class="card">
    <div class="card-title">➕ 记录体重</div>
    <div class="form-row">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="wDate">
      </div>
      <div class="form-group">
        <label>体重 (kg)</label>
        <input type="number" id="wValue" placeholder="例如 65.5" step="0.1" min="30" max="300">
      </div>
      <div class="form-group">
        <label>备注（可选）</label>
        <input type="text" id="wNote" placeholder="早起空腹…">
      </div>
      <button class="btn btn-primary"
        style="flex-shrink:0;height:38px;align-self:flex-end"
        onclick="handleAddWeight()">
        记录
      </button>
    </div>
  </div>

  <!-- 体重图表 -->
  <div class="card">
    <div class="card-title">📊 体重变化图表</div>
    <div class="chart-container">
      <canvas id="weightChart"></canvas>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div class="card-title">📋 历史记录</div>
    <div id="weightList"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/db.js"></script>
<script>

let weights = [];
let chartInstance = null;

// ===== 初始化 =====
(async () => {
  const ok = await requireAuth();
  if (!ok) return;

  document.getElementById('wDate').value = today();

  showLoading(true);
  weights = await getWeights();
  showLoading(false);

  renderAll();
})();

function renderAll() {
  renderList();
  renderChart();
}

// ===== 添加体重 =====
async function handleAddWeight() {
  const date  = document.getElementById('wDate').value;
  const value = document.getElementById('wValue').value;
  const note  = document.getElementById('wNote').value;

  if (!date || !value) { alert('请填写日期和体重'); return; }

  // 检查同日是否已有记录
  const dup = weights.find(w => w.date === date);
  if (dup) {
    if (!confirm('该日期已有记录，是否覆盖？')) return;
    try {
      await deleteWeight(dup.id);
      weights = weights.filter(w => w.id !== dup.id);
    } catch(e) {
      alert('删除旧记录失败：' + e.message);
      return;
    }
  }

  const btn = document.querySelector('button[onclick="handleAddWeight()"]');
  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    const newW = await addWeight(date, parseFloat(value), note);
    weights.push(newW);
    weights.sort((a, b) => a.date.localeCompare(b.date));

    document.getElementById('wValue').value = '';
    document.getElementById('wNote').value  = '';

    renderAll();
    showToast('✅ 体重已记录');
  } catch(e) {
    alert('记录失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '记录';
  }
}

// ===== 删除体重 =====
async function handleDeleteWeight(id) {
  if (!confirm('确认删除？')) return;
  try {
    await deleteWeight(id);
    weights = weights.filter(w => w.id !== id);
    renderAll();
    showToast('已删除');
  } catch(e) {
    alert('删除失败：' + e.message);
  }
}

// ===== 渲染列表 =====
function renderList() {
  const el = document.getElementById('weightList');
  if (!weights.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚖️</div>
      <div class="empty-text">还没有记录，开始记录你的体重吧！</div>
    </div>`;
    return;
  }

  const sorted = [...weights].reverse();
  el.innerHTML = sorted.map((w, ri) => {
    const origIdx = weights.length - 1 - ri;
    const prev    = weights[origIdx - 1];
    const diff    = prev ? (w.value - prev.value).toFixed(1) : null;
    let diffStr   = '';
    if (diff !== null) {
      diffStr = diff > 0
        ? `<span style="color:#dc2626;font-size:12px"> ▲${diff}</span>`
        : `<span style="color:var(--primary);font-size:12px"> ▼${Math.abs(diff)}</span>`;
    }
    return `<div class="list-item">
      <div class="list-item-main">
        <div class="list-item-title">${w.date}${diffStr}</div>
        <div class="list-item-sub">${w.note || '无备注'}</div>
      </div>
      <div class="list-item-value">${w.value} kg</div>
      <button class="btn btn-danger btn-sm" onclick="handleDeleteWeight('${w.id}')">删除</button>
    </div>`;
  }).join('');
}

// ===== 渲染图表 =====
function renderChart() {
  const ctx = document.getElementById('weightChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  if (!weights.length) return;

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: weights.map(w => w.date.slice(5)),
      datasets: [{
        label: '体重 (kg)',
        data: weights.map(w => w.value),
        borderColor: '#4CAF82',
        backgroundColor: 'rgba(76,175,130,0.1)',
        borderWidth: 2.5,
        pointBackgroundColor: '#4CAF82',
        pointRadius: 4,
        tension: 0.35,
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.parsed.y} kg` } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#718096', font: { size: 11 } } },
        y: { grid: { color: '#f1f5f9' }, ticks: { color: '#718096', font: { size: 11 } } }
      }
    }
  });
}

</script>
</body>
</html>
