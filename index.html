<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>减肥追踪 · 登录</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span>🔥</span>
      <span>减肥追踪</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="registerTab" onclick="switchTab('register')">注册</button>
    </div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="form-group" style="margin-top:14px">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="至少 6 位"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doAuth()">
    </div>

    <button class="btn btn-primary" id="authBtn"
      style="width:100%;margin-top:20px;padding:12px;font-size:15px"
      onclick="doAuth()">
      登录
    </button>

    <p class="auth-hint">数据加密保存在云端，多设备同步</p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>

// 如果已登录直接跳转
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

// 监听邮件确认回调
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = 'dashboard.html';
  }
});

let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.getElementById('loginTab').classList.toggle('active', mode === 'login');
  document.getElementById('registerTab').classList.toggle('active', mode === 'register');
  document.getElementById('authBtn').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

async function doAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl    = document.getElementById('authError');
  const okEl     = document.getElementById('authSuccess');
  const btn      = document.getElementById('authBtn');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!email || !password) { showErr('请填写邮箱和密码'); return; }
  if (password.length < 6) { showErr('密码至少 6 位'); return; }

  btn.disabled = true;
  btn.textContent = authMode === 'login' ? '登录中…' : '注册中…';

  let result;
  if (authMode === 'login') {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({ email, password });
  }

  if (result.error) {
    showErr(friendlyError(result.error.message));
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? '登录' : '注册';
    return;
  }

  // 注册成功但需要确认邮件
  if (authMode === 'register' && !result.data.session) {
    okEl.textContent = '📧 注册成功！请检查邮箱点击确认链接后再登录。';
    okEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '注册';
    return;
  }

  window.location.href = 'dashboard.html';
}

function showErr(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function friendlyError(msg) {
  if (msg.includes('Invalid login'))       return '邮箱或密码错误，请重试';
  if (msg.includes('Email not confirmed')) return '邮箱尚未验证，请先点击确认邮件';
  if (msg.includes('already registered'))  return '该邮箱已注册，请直接登录';
  if (msg.includes('Password should'))     return '密码至少需要 6 位';
  return msg;
}

</script>
</body>
</html>
